<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Lead — Lead CRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <nav class="bg-white border-b border-gray-200 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16 items-center">
        <a href="/" class="text-xl font-bold text-gray-900">🧠 Lead CRM</a>
        <div class="flex gap-4 items-center">
          <a href="/" class="text-sm text-gray-600 hover:text-gray-900">Dashboard</a>
          <a href="/leads/new" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-blue-700">+ Add Lead</a>
        </div>
      </div>
    </div>
  </nav>

  <main class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <h1 class="text-2xl font-bold mb-6">Add New Lead</h1>
    <div id="error" class="bg-red-50 text-red-700 p-3 rounded-lg mb-4 text-sm hidden"></div>

    <form id="lead-form" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Business Name *</label>
        <input type="text" id="business_name" class="w-full border border-gray-300 rounded-lg p-2 text-sm focus:ring-2 focus:ring-blue-500" required>
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Sector</label>
          <input type="text" id="sector" class="w-full border border-gray-300 rounded-lg p-2 text-sm" placeholder="e.g. Auto Services">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Rating</label>
          <input type="text" id="rating" class="w-full border border-gray-300 rounded-lg p-2 text-sm" placeholder="e.g. 4.8 Stars">
        </div>
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Review Count</label>
          <input type="number" id="review_count" class="w-full border border-gray-300 rounded-lg p-2 text-sm" placeholder="e.g. 150">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Phone</label>
          <input type="text" id="phone" class="w-full border border-gray-300 rounded-lg p-2 text-sm" placeholder="+6012-345 6789">
        </div>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Current Web Presence</label>
        <input type="text" id="current_web_presence" class="w-full border border-gray-300 rounded-lg p-2 text-sm" placeholder="No website / Facebook only">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Why They Need a Website</label>
        <input type="text" id="why_they_need_website" class="w-full border border-gray-300 rounded-lg p-2 text-sm" placeholder="e.g. Losing customers to competitors">
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Recommended Domain</label>
          <input type="text" id="recommended_domain" class="w-full border border-gray-300 rounded-lg p-2 text-sm" placeholder="business.com.my">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Google Maps URL</label>
          <input type="text" id="google_maps_url" class="w-full border border-gray-300 rounded-lg p-2 text-sm" placeholder="https://maps.google.com/...">
        </div>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Notes</label>
        <textarea id="notes" rows="3" class="w-full border border-gray-300 rounded-lg p-2 text-sm" placeholder="Any additional info..."></textarea>
      </div>
      <div class="flex gap-3 pt-2">
        <button type="submit" id="submit-btn" class="bg-blue-600 text-white px-6 py-2.5 rounded-lg text-sm font-medium hover:bg-blue-700">Save Lead</button>
        <a href="/" class="bg-gray-100 text-gray-700 px-6 py-2.5 rounded-lg text-sm font-medium hover:bg-gray-200">Cancel</a>
      </div>
    </form>
  </main>

  <script>
    document.getElementById('lead-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      btn.disabled = true; btn.textContent = 'Saving...';

      const data = {
        business_name: document.getElementById('business_name').value,
        sector: document.getElementById('sector').value || null,
        rating: document.getElementById('rating').value || null,
        review_count: parseInt(document.getElementById('review_count').value) || null,
        current_web_presence: document.getElementById('current_web_presence').value || null,
        why_they_need_website: document.getElementById('why_they_need_website').value || null,
        recommended_domain: document.getElementById('recommended_domain').value || null,
        google_maps_url: document.getElementById('google_maps_url').value || null,
        phone: document.getElementById('phone').value || null,
        notes: document.getElementById('notes').value || null,
      };

      const res = await fetch('/api/leads', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      });

      if (res.ok) { window.location.href = '/'; }
      else {
        const err = await res.json();
        const errDiv = document.getElementById('error');
        errDiv.textContent = err.error || 'Failed to create lead';
        errDiv.classList.remove('hidden');
        btn.disabled = false; btn.textContent = 'Save Lead';
      }
    });
  </script>
</body>
</html>
