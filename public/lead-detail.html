<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lead Detail — Lead CRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <nav class="bg-white border-b border-gray-200 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16 items-center">
        <a href="/" class="text-xl font-bold text-gray-900">🧠 Lead CRM</a>
        <div class="flex gap-4 items-center">
          <a href="/" class="text-sm text-gray-600 hover:text-gray-900">Dashboard</a>
          <a href="/leads/new" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-blue-700">+ Add Lead</a>
        </div>
      </div>
    </div>
  </nav>

  <main class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div id="loading" class="text-center py-12 text-gray-400">Loading...</div>
    <div id="not-found" class="text-center py-12 text-gray-400 hidden">Lead not found</div>

    <div id="lead-content" class="hidden">
      <div class="flex justify-between items-start mb-6">
        <div>
          <h1 id="business-name" class="text-2xl font-bold"></h1>
          <p id="created-date" class="text-gray-500 text-sm mt-1"></p>
        </div>
        <button id="delete-btn" class="text-red-600 text-sm hover:text-red-800 px-3 py-1">Delete</button>
      </div>

      <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-6">
        <div class="grid grid-cols-2 gap-6">
          <div><label class="text-xs text-gray-500 uppercase">Sector</label><p id="sector" class="mt-1">—</p></div>
          <div><label class="text-xs text-gray-500 uppercase">Rating</label><p id="rating" class="mt-1">—</p></div>
          <div><label class="text-xs text-gray-500 uppercase">Current Web Presence</label><p id="web-presence" class="mt-1">—</p></div>
          <div><label class="text-xs text-gray-500 uppercase">Why Need Website</label><p id="why-need" class="mt-1">—</p></div>
          <div><label class="text-xs text-gray-500 uppercase">Recommended Domain</label><p id="domain" class="mt-1">—</p></div>
          <div><label class="text-xs text-gray-500 uppercase">Phone</label><p id="phone" class="mt-1">—</p></div>
        </div>
      </div>

      <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
        <h2 class="text-lg font-semibold mb-4">Update Lead</h2>
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-2">Status</label>
          <div id="status-buttons" class="flex flex-wrap gap-2"></div>
        </div>
        <div id="status-timestamps" class="mb-4 text-xs text-gray-500 space-y-1"></div>
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-2">Notes</label>
          <textarea id="notes" rows="4" class="w-full border border-gray-300 rounded-lg p-3 text-sm"></textarea>
        </div>
        <div class="flex gap-3">
          <button id="save-btn" class="bg-blue-600 text-white px-6 py-2.5 rounded-lg text-sm font-medium hover:bg-blue-700">Save Changes</button>
          <a href="/" class="bg-gray-100 text-gray-700 px-6 py-2.5 rounded-lg text-sm font-medium hover:bg-gray-200">Back to Dashboard</a>
        </div>
      </div>
    </div>
  </main>

  <script>
    const STATUS_LABELS = { new: 'New', contacted: 'Contacted', replied: 'Replied', pitched: 'Pitched', closed: 'Closed', lost: 'Lost' };
    const STATUS_COLORS = { new: 'bg-blue-100 text-blue-800', contacted: 'bg-yellow-100 text-yellow-800', replied: 'bg-purple-100 text-purple-800', pitched: 'bg-indigo-100 text-indigo-800', closed: 'bg-green-100 text-green-800', lost: 'bg-red-100 text-red-800' };

    const leadId = window.location.pathname.split('/').pop();
    let currentLead = null;

    async function loadLead() {
      const res = await fetch(`/api/leads/${leadId}`);
      if (!res.ok) {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('not-found').classList.remove('hidden');
        return;
      }
      currentLead = await res.json();
      renderLead();
    }

    function renderLead() {
      const l = currentLead;
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('lead-content').classList.remove('hidden');
      document.getElementById('business-name').textContent = l.business_name;
      document.getElementById('created-date').textContent = 'Added ' + new Date(l.created_at).toLocaleDateString('en-MY', { day: 'numeric', month: 'long', year: 'numeric' });
      document.getElementById('sector').textContent = l.sector || '—';
      document.getElementById('rating').innerHTML = l.rating ? `<span class="text-yellow-500">★</span> ${l.rating}${l.review_count ? ` (${l.review_count} reviews)` : ''}` : '—';
      document.getElementById('web-presence').textContent = l.current_web_presence || '—';
      document.getElementById('why-need').textContent = l.why_they_need_website || '—';
      document.getElementById('domain').textContent = l.recommended_domain || '—';
      document.getElementById('phone').textContent = l.phone || '—';
      document.getElementById('notes').value = l.notes || '';

      // Status buttons
      const statusDiv = document.getElementById('status-buttons');
      statusDiv.innerHTML = Object.keys(STATUS_LABELS).map(s => `
        <button onclick="setStatus('${s}')" class="px-4 py-2 rounded-lg text-sm font-medium transition-all ${l.status === s ? STATUS_COLORS[s] + ' ring-2 ring-offset-2 ring-gray-400' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}">${STATUS_LABELS[s]}</button>
      `).join('');

      // Timestamps
      const tsDiv = document.getElementById('status-timestamps');
      const timestamps = [];
      if (l.contacted_at) timestamps.push(`Contacted: ${new Date(l.contacted_at).toLocaleString()}`);
      if (l.replied_at) timestamps.push(`Replied: ${new Date(l.replied_at).toLocaleString()}`);
      if (l.pitched_at) timestamps.push(`Pitched: ${new Date(l.pitched_at).toLocaleString()}`);
      if (l.closed_at) timestamps.push(`Closed: ${new Date(l.closed_at).toLocaleString()}`);
      tsDiv.innerHTML = timestamps.length ? timestamps.join('<br>') : 'No status history yet.';
    }

    async function setStatus(status) {
      await fetch(`/api/leads/${leadId}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status }),
      });
      currentLead.status = status;
      renderLead();
    }

    document.getElementById('save-btn').addEventListener('click', async () => {
      const btn = document.getElementById('save-btn');
      btn.disabled = true; btn.textContent = 'Saving...';
      await fetch(`/api/leads/${leadId}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ notes: document.getElementById('notes').value }),
      });
      btn.disabled = false; btn.textContent = 'Saved ✓';
      setTimeout(() => { btn.textContent = 'Save Changes'; }, 2000);
    });

    document.getElementById('delete-btn').addEventListener('click', async () => {
      if (!confirm('Delete this lead permanently?')) return;
      await fetch(`/api/leads/${leadId}`, { method: 'DELETE' });
      window.location.href = '/';
    });

    loadLead();
  </script>
</body>
</html>
