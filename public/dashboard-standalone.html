    const STATUS_LABELS = { new: 'New', contacted: 'Contacted', replied: 'Replied', pitched: 'Pitched', closed: 'Closed', lost: 'Lost' };
    const STATUS_COLORS = { new: 'bg-blue-100 text-blue-800', contacted: 'bg-yellow-100 text-yellow-800', replied: 'bg-purple-100 text-purple-800', pitched: 'bg-indigo-100 text-indigo-800', closed: 'bg-green-100 text-green-800', lost: 'bg-red-100 text-red-800' };

    async function loadLeads() {
      const res = await fetch('/api/leads');
      const leads = await res.json();
      const stats = { total: leads.length };
      'new,contacted,replied,pitched,closed,lost'.split(',').forEach(s => stats[s] = leads.filter(l => l.status === s).length);

      const statCards = document.getElementById('stats');
      statCards.innerHTML = '';
      const statData = [
        { label: 'Total', count: stats.total, color: 'bg-gray-600' },
        { label: 'New', count: stats.new, color: 'bg-blue-500' },
        { label: 'Contacted', count: stats.contacted, color: 'bg-yellow-500' },
        { label: 'Replied', count: stats.replied, color: 'bg-purple-500' },
        { label: 'Pitched', count: stats.pitched, color: 'bg-indigo-500' },
        { label: 'Closed', count: stats.closed, color: 'bg-green-500' },
        { label: 'Lost', count: stats.lost, color: 'bg-red-500' },
      ];
      statData.forEach(card => {
        statCards.innerHTML += `
          <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-4">
            <div class="flex items-center gap-3">
              <div class="w-3 h-3 rounded-full ${card.color}"></div>
              <span class="text-sm text-gray-600">${card.label}</span>
            </div>
            <p class="text-2xl font-bold mt-2">${card.count}</p>
          </div>
        `;
      });

      const tbody = document.getElementById('leads-table');
      if (leads.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="p-8 text-center text-gray-400">No leads yet. Add your first lead to get started.</td></tr>';
        return;
      }
      tbody.innerHTML = leads.map(l => `
        <tr class="hover:bg-gray-50">
          <td class="p-3 font-medium">${l.business_name}</td>
          <td class="p-3 text-gray-600">${l.sector || '—'}</td>
          <td class="p-3"><span class="text-yellow-500">★</span> ${l.rating || '—'}${l.review_count ? ` (${l.review_count})` : ''}</td>
          <td class="p-3"><span class="inline-flex px-2 py-1 rounded-full text-xs font-medium ${STATUS_COLORS[l.status]}">${STATUS_LABELS[l.status]}</span></td>
          <td class="p-3 text-gray-500 text-xs">${new Date(l.created_at).toLocaleDateString('en-MY', { day: 'numeric', month: 'short', year: 'numeric' })}</td>
          <td class="p-3"><a href="/leads/${l.id}" class="text-blue-600 hover:text-blue-800 text-sm">View</a></td>
        </tr>
      `).join('');
    }
